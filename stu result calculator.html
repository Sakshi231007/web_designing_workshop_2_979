<!DOCTYPE html>
<html>
<head>
    <title>Student Result Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            margin: 5px;
            padding: 8px;
            width: 100px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>Student Result Calculator</h2>

    <input type="number" id="sub1" placeholder="Subject 1"><br>
    <input type="number" id="sub2" placeholder="Subject 2"><br>
    <input type="number" id="sub3" placeholder="Subject 3"><br>
    <input type="number" id="sub4" placeholder="Subject 4"><br>
    <input type="number" id="sub5" placeholder="Subject 5"><br>

    <br>
    <button onclick="calculateResult()">Calculate</button>

    <div class="result" id="output"></div>

    <script>
        function calculateResult() {
            let s1 = Number(document.getElementById("sub1").value);
            let s2 = Number(document.getElementById("sub2").value);
            let s3 = Number(document.getElementById("sub3").value);
            let s4 = Number(document.getElementById("sub4").value);
            let s5 = Number(document.getElementById("sub5").value);

            let total = s1 + s2 + s3 + s4 + s5;
            let percentage = total / 5;
            let grade = "";

            if (percentage >= 90) grade = "A+";
            else if (percentage >= 75) grade = "A";
            else if (percentage >= 60) grade = "B";
            else if (percentage >= 50) grade = "C";
            else grade = "Fail";

            document.getElementById("output").innerHTML =
                "Total Marks: " + total + "<br>" +
                "Percentage: " + percentage.toFixed(2) + "%<br>" +
                "Grade: " + grade;
        }
    </script>

</body>
</html>
